# compose.yaml
# Docker Compose integration wiring the APEX application container to the Kali tool-service container over an internal, non-host-published network (Infra Phase 7), plus an optional "htb" profile (Infra Phase 10) that adds a dedicated VPN container for authorized HTB engagements.
#
# Default topology (always active, no profile flag needed):
#
#   apex container  --internal authenticated HTTP-->  kali container
#   (docker/apex/Dockerfile)      apex-internal        (docker/kali/Dockerfile)
#                                  network              http://kali:8080
#
# Start (safe, target-free — see docs/docker-compose.md for full detail):
#
#   APEX_TOOL_SERVICE_TOKEN=replace-with-a-disposable-test-token \
#     docker compose up --build --abort-on-container-exit
#
# `--abort-on-container-exit` is the chosen workflow: the `apex` service's
# default command is a bounded connectivity smoke check that exits quickly,
# while `kali` is a long-running HTTP server with no natural exit — without
# this flag, `docker compose up` would leave `kali` running indefinitely
# after `apex` finishes. See docs/docker-compose.md "Safe default behavior"
# for the full rationale.
#
# No top-level `version:` key — this file uses the modern Compose
# Specification, where `version:` is deprecated/ignored by Compose v2.
# `docker compose version` (v2.34.0-desktop.1, verified this phase) does
# not require it.
#
# HTB VPN routing (Infra Phase 10): the `vpn` service below is gated behind
# the "htb" Compose profile (`profiles: ["htb"]`) — it is NEVER started by
# a bare `docker compose up`. The default topology above (apex + kali on
# apex-internal) is completely unaffected by its existence and remains
# VPN-independent and target-free, exactly as it was in Infra Phase 7-9.
# The full HTB-mode topology (vpn + kali sharing vpn's network namespace +
# apex) requires a SECOND compose file, `compose.htb.yaml`, merged in via
# `-f`:
#
#   APEX_TOOL_SERVICE_TOKEN=... APEX_HTB_OVPN_PATH=./secrets/htb.ovpn \
#     docker compose -f compose.yaml -f compose.htb.yaml --profile htb \
#     up --build --abort-on-container-exit
#
# Why a second file rather than one: Compose has no mechanism to give a
# single named service two different `network_mode`/`networks`
# configurations depending on which profile is active — profiles only
# gate whether a whole service starts, not which of two configs it uses.
# `compose.htb.yaml` is the standard Compose idiom for this
# ("docker-compose override file") — it redefines `kali`'s networking
# (`network_mode: service:vpn` instead of `networks: [apex-internal]`) and
# `apex`'s `APEX_TOOL_SERVICE_URL`/`APEX_VPN_SERVICE_URL` for HTB mode
# only, leaving THIS file's `kali`/`apex` service definitions completely
# unmodified for the default, non-htb case. Full design, trust boundary,
# and every verified command: docs/htb-vpn-container.md.
#
# Infra Phase 8: every environment variable interpolated below (other than
# the required token) now uses Compose's `${VAR:-default}` syntax, with the
# default matching either apex_tool_service/settings.py's own real,
# implemented ServiceSettings default (for the "kali" service) or this
# file's own pre-existing Infra Phase 7 default (for "apex"'s tool-backend
# selection). This means every value is now overridable by copying
# .env.example to .env and uncommenting/editing a line, with zero behavior
# change for anyone who does not. Every name here matches .env.example
# exactly — see docs/environment-configuration.md "Docker Compose usage".

services:
  # ---------------------------------------------------------------------
  # kali — the restricted tool-execution appliance (Infra Phase 6).
  # Reachable ONLY from other services on `apex-internal`; never published
  # to the host (no `ports:` mapping — see the `expose:` note below).
  # ---------------------------------------------------------------------
  kali:
    build:
      context: .
      dockerfile: docker/kali/Dockerfile
    networks:
      - apex-internal
    environment:
      # Fail-fast interpolation: `docker compose config`/`up`/`build` all
      # refuse to proceed if this is unset or empty, per this phase's own
      # requirement — no reusable default token is baked in anywhere.
      APEX_TOOL_SERVICE_TOKEN: ${APEX_TOOL_SERVICE_TOKEN:?APEX_TOOL_SERVICE_TOKEN must be set — see docs/docker-compose.md}
      # Everything below is optional — each default matches
      # apex_tool_service/settings.py's own real, implemented
      # ServiceSettings default exactly (Infra Phase 8; see .env.example
      # "Tool-service server configuration"). Overriding any of these here
      # via Compose takes precedence over the equivalent `ENV` baked into
      # docker/kali/Dockerfile, since Compose's own `environment:` always
      # wins over a Dockerfile's `ENV` at container-start time.
      APEX_TOOL_SERVICE_HOST: ${APEX_TOOL_SERVICE_HOST:-0.0.0.0}
      APEX_TOOL_SERVICE_PORT: ${APEX_TOOL_SERVICE_PORT:-8080}
      APEX_TOOL_SERVICE_DEFAULT_TIMEOUT_SECONDS: ${APEX_TOOL_SERVICE_DEFAULT_TIMEOUT_SECONDS:-30}
      APEX_TOOL_SERVICE_MAX_TIMEOUT_SECONDS: ${APEX_TOOL_SERVICE_MAX_TIMEOUT_SECONDS:-120}
      APEX_TOOL_SERVICE_MAX_ARGUMENTS: ${APEX_TOOL_SERVICE_MAX_ARGUMENTS:-32}
      APEX_TOOL_SERVICE_MAX_ARGUMENT_LENGTH: ${APEX_TOOL_SERVICE_MAX_ARGUMENT_LENGTH:-512}
      APEX_TOOL_SERVICE_MAX_STDIN_BYTES: ${APEX_TOOL_SERVICE_MAX_STDIN_BYTES:-65536}
      APEX_TOOL_SERVICE_MAX_STDOUT_BYTES: ${APEX_TOOL_SERVICE_MAX_STDOUT_BYTES:-1048576}
      APEX_TOOL_SERVICE_MAX_STDERR_BYTES: ${APEX_TOOL_SERVICE_MAX_STDERR_BYTES:-1048576}
      # Phase 22 — the dedicated POST /v1/bounded-file-read operation's own,
      # narrower limits and independent target-authorization allowlist. See
      # .env.example's Phase 22 section and docs/user-flag-objective.md §19
      # for the full rationale — this is a structurally different,
      # more restrictive capability than the generic-tool limits above.
      APEX_TOOL_SERVICE_BOUNDED_READ_MAX_BYTES: ${APEX_TOOL_SERVICE_BOUNDED_READ_MAX_BYTES:-4096}
      APEX_TOOL_SERVICE_BOUNDED_READ_TIMEOUT: ${APEX_TOOL_SERVICE_BOUNDED_READ_TIMEOUT:-10}
      APEX_TOOL_SERVICE_ALLOWED_FLAG_BASENAMES: ${APEX_TOOL_SERVICE_ALLOWED_FLAG_BASENAMES:-user.txt}
      APEX_TOOL_SERVICE_AUTHORIZED_CIDRS: ${APEX_TOOL_SERVICE_AUTHORIZED_CIDRS:-10.129.0.0/16}
    # `expose:` documents intent (reachable on the Compose network at port
    # 8080) but is not strictly required — Compose already makes every
    # service's ports reachable to other services on the same network
    # without it. It is intentionally NOT `ports:`, which would publish
    # the port to the host — the one thing this phase's task brief
    # explicitly forbids by default.
    expose:
      - "8080"
    # No `healthcheck:` override here: docker/kali/Dockerfile already bakes
    # in a HEALTHCHECK (curl against the unauthenticated GET /health, no
    # tool invoked, no secret exposed — see docs/kali-container.md §6).
    # Docker Compose reads a container's health status from whichever
    # HEALTHCHECK is active (image-defined or compose-defined); duplicating
    # it here would only risk the two definitions drifting apart. `apex`'s
    # `depends_on: kali: condition: service_healthy` below relies on this
    # same, single, image-defined healthcheck.
    #
    # No `user:` override: the image's own `USER apextool` (UID/GID 1000,
    # no login shell, no sudo — docs/kali-container.md §5) already applies.
    #
    # No `privileged:`, no `cap_add:`, no `network_mode: host`, no
    # `/var/run/docker.sock` mount, anywhere in this file. `ping` and
    # `nmap -sT` were empirically verified (Infra Phase 6) to work
    # unprivileged with zero added capabilities; `nmap`'s default/SYN-scan
    # mode does not, and this phase's task brief explicitly forbids adding
    # NET_RAW/NET_ADMIN "merely to make default Nmap SYN scans work" — see
    # docs/docker-compose.md §15 for the full, unchanged-from-Phase-6
    # capability discussion.
    #
    # No volumes: kali never mounts `./run_reports` or any other APEX
    # report/knowledge/secret path — it has no reason to read or write
    # anything outside its own image filesystem.

  # ---------------------------------------------------------------------
  # vpn — the dedicated OpenVPN + readiness-server appliance (Infra
  # Phase 10, docker/vpn/Dockerfile). Gated behind the "htb" Compose
  # profile — NEVER started by a bare `docker compose up` (no `profiles:`
  # key at all on `kali`/`apex` above means they always start; `vpn`
  # having `profiles: ["htb"]` means it starts ONLY when `--profile htb`
  # is passed). In HTB mode, `kali` shares this service's network
  # namespace (`compose.htb.yaml`'s `network_mode: service:vpn`) — see
  # docs/htb-vpn-container.md for the full topology and why this specific
  # design was chosen over the alternatives.
  # ---------------------------------------------------------------------
  vpn:
    build:
      context: .
      dockerfile: docker/vpn/Dockerfile
    profiles:
      - htb
    networks:
      - apex-internal
    environment:
      APEX_HTB_ROUTE_CIDR: ${APEX_HTB_ROUTE_CIDR:-10.129.0.0/16}
    volumes:
      # Soft default (/dev/null) here, NOT the fail-fast `:?` form —
      # Compose interpolates/validates EVERY service declared in a file
      # up front, regardless of whether that service's profile is active
      # (`profiles:` only gates whether a service actually *starts*, not
      # whether its config is parsed). A `:?` requirement here would break
      # the "default safe Compose workflow must not require a VPN
      # profile" invariant, since a bare `docker compose up`/`config`
      # (no --profile htb) would fail before ever reaching that gate —
      # verified this phase (see docs/htb-vpn-container.md §5 for the
      # exact error this fix resolves). The REAL fail-fast requirement
      # lives in compose.htb.yaml instead, which replaces this entire
      # `volumes:` list (Compose's list-merge semantics: declared-in-
      # override replaces, not merges) — it is only ever evaluated when
      # `compose.htb.yaml` is explicitly merged in via `-f`. Read-only
      # (`:ro`) either way — the VPN container's own entrypoint
      # (docker/vpn/entrypoint.py) never writes to this path, defense in
      # depth on top of the read-only mount itself. NEVER copied into any
      # image — see docker/vpn/Dockerfile's own "profile is never baked
      # in" comment.
      - ${APEX_HTB_OVPN_PATH:-/dev/null}:/vpn/htb.ovpn:ro
    # Only this service receives NET_ADMIN and /dev/net/tun — never kali,
    # never apex. See docker/vpn/Dockerfile's own extensive comment on why
    # this is the one narrow, documented exception to this project's
    # otherwise-universal non-root convention (OpenVPN's own operational
    # requirement to create a tun device and modify this container's own
    # routing table).
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # `expose:` documents intent (the readiness server, port 8090, is
    # reachable to other services on apex-internal) — never `ports:`,
    # which would publish it to the host.
    expose:
      - "8090"
    # No `healthcheck:` override: docker/vpn/Dockerfile already bakes one
    # in (GET /health against the readiness server itself — tunnel/route
    # status, not mere OpenVPN process existence). `compose.htb.yaml`'s
    # `depends_on: vpn: condition: service_healthy` relies on this same,
    # single, image-defined healthcheck.
    #
    # No volumes beyond the profile mount above: vpn never mounts
    # `./run_reports` or any APEX/knowledge path — it has no reason to.

  # ---------------------------------------------------------------------
  # apex — the orchestration/planning/policy/memory application (Infra
  # Phase 5). Waits for `kali` to report healthy before starting.
  # ---------------------------------------------------------------------
  apex:
    build:
      context: .
      dockerfile: docker/apex/Dockerfile
    depends_on:
      kali:
        condition: service_healthy
    networks:
      - apex-internal
    environment:
      # Generic (non-Telnet, non-browser) commands route through
      # RemoteToolBackend to the `kali` service by service name — Compose's
      # built-in DNS resolves `kali` to the container's address on
      # `apex-internal`; no fixed IP is configured anywhere (see
      # docs/docker-compose.md "Service discovery").
      #
      # IMPORTANT: apex_host/config.py itself never reads environment
      # variables (test_arch_08_config_py_has_no_env_access) — these three
      # variables are read directly by
      # apex_host/eval/compose_smoke.py (APEX_TOOL_BACKEND,
      # APEX_TOOL_SERVICE_URL) and by RemoteToolBackend.__init__ itself
      # (APEX_TOOL_SERVICE_TOKEN, as a fallback — see
      # docs/remote-tool-backend.md §3.2). A full multi-turn engagement
      # (`run_htb_local.py`) would instead need the equivalent
      # `--tool-backend remote --tool-service-url http://kali:8080` CLI
      # flags, since that entry point's ApexConfig is built via CLI
      # arguments, not these env vars directly — see
      # docs/docker-compose.md "Internal networking" for the full
      # env-var-vs-CLI-flag explanation.
      APEX_TOOL_BACKEND: ${APEX_TOOL_BACKEND:-remote}
      APEX_TOOL_SERVICE_URL: ${APEX_TOOL_SERVICE_URL:-http://kali:8080}
      APEX_TOOL_SERVICE_TOKEN: ${APEX_TOOL_SERVICE_TOKEN:?APEX_TOOL_SERVICE_TOKEN must be set — see docs/docker-compose.md}
    volumes:
      # Report persistence outside the container — a plain bind mount
      # (rather than a named volume) so an operator can inspect
      # ./run_reports/compose_smoke.json directly from the host without an
      # extra `docker cp`. `/app/run_reports` is already created and
      # chowned to the image's non-root `apex` user (UID 1000) at build
      # time (docker/apex/Dockerfile) — write-access from inside the
      # container was verified empirically this phase (see
      # docs/docker-compose.md "Report persistence" for the macOS
      # bind-mount UID finding).
      - ./run_reports:/app/run_reports
    # Compiled knowledge is available exactly once: baked into the
    # `apex` image itself at /app/knowledge (docker/apex/Dockerfile,
    # docs/apex-container.md §9) — this file does NOT additionally mount
    # ./Knowledge or ./knowledge over it, which would create a second,
    # differently-cased, possibly-inconsistent copy. No raw knowledge
    # corpus, no secrets directory, and no `.ovpn` file is mounted
    # anywhere in this file.
    #
    # No `user:` override: the image's own `USER apex` (UID/GID 1000)
    # already applies. No Docker socket, no host networking, no
    # `privileged:`, no added capabilities.
    #
    # Safe default command (Infra Phase 9): the container's own ENTRYPOINT
    # (docker/apex/Dockerfile, apex_host.container_entrypoint) 'smoke' mode
    # — NOT a live engagement, NOT `run_htb_local`, no target anywhere.
    # Unlike Phase 7/8's default (apex_host.eval.compose_smoke, dry-run by
    # default), 'smoke' mode DOES make a real, but harmless and bounded,
    # connectivity check: it validates local configuration/report-directory/
    # compiled-knowledge/policy, then calls Kali's own unauthenticated
    # GET /health, then runs exactly one hardcoded, non-configurable
    # `curl --version` through the real RemoteToolBackend. See
    # docs/container-entrypoint.md "Smoke mode" for why this does not weaken
    # the dry-run safety invariant (no target, no user-controllable command).
    # --knowledge-root points at this image's own baked-in compiled
    # knowledge, matching docker/apex/Dockerfile's own default CMD.
    command: ["smoke", "--knowledge-root", "/app/knowledge"]

networks:
  # A single, dedicated, internal-by-convention network — Compose does not
  # expose any service on this network to the host unless a service also
  # declares a `ports:` mapping (neither service here does). No fixed IPs
  # are assigned to either service; both are reached only via Compose's
  # built-in service-name DNS. No HTB routing exists on this network —
  # see docs/docker-compose.md §17 "Deferred VPN phase".
  apex-internal:
    name: apex-internal

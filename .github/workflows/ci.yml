# ci.yml
# Continuous integration (Infra Phase 11) — validates the committed lock file, runs the full test/lint/type-check suite, renders both Compose configurations, and builds all three project images WITHOUT pushing them anywhere. Never authenticates to GHCR, never contacts HTB, never starts a real VPN.
#
# Runs on every pull request and every push to the default branch (see
# docs/github-actions.md for the full design). Publishing to GHCR is a
# SEPARATE workflow (docker-publish.yml) that only runs on trusted events
# (default-branch pushes, version tags) — this file never pushes an image
# or writes a package, by design, so it is safe to run unmodified on
# untrusted pull-request code (permissions below grant read-only repo
# access and nothing else).

name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Least privilege: this workflow only ever reads the repository. It never
# authenticates to GHCR and never writes a package — see
# docker-publish.yml for the separate, higher-privilege workflow that
# does. No job below overrides this with additional scopes.
permissions:
  contents: read

# One in-flight run per PR (or per push ref) — a new push to the same PR
# cancels the previous, still-running CI for that PR. Pushes to `main`
# share a group keyed by the same logic, so back-to-back pushes to main
# don't pile up either. Uses its own concurrency group, entirely separate
# from docker-publish.yml's (see that file for why publishing uses
# `cancel-in-progress: false` instead).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Python validation: the exact same commands documented in README.md
  # "Development environment (uv)" and required by every prior Infra
  # Phase's own local validation section — never a reduced-scope subset.
  # ---------------------------------------------------------------------
  validate:
    name: Validate (lock, sync, pytest, ruff, mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Matches .python-version and [project].requires-python in
          # pyproject.toml, and the exact interpreter version baked into
          # every project Dockerfile (docker/apex, docker/kali share the
          # same python:3.11.14-slim-bookworm digest; docker/vpn installs
          # the same 3.11.14 via uv).
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # Matches the uv version pinned as a build stage in every
          # project Dockerfile (ghcr.io/astral-sh/uv:0.11.28, digest-pinned
          # — see docker/apex/Dockerfile, docker/kali/Dockerfile).
          version: "0.11.28"
          enable-cache: true

      - name: Verify uv.lock is up to date
        run: uv lock --check

      - name: Install frozen dependencies
        run: uv sync --frozen --all-groups

      - name: Run full test suite
        run: uv run pytest -q

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy (strict, project-scoped)
        run: uv run mypy

  # ---------------------------------------------------------------------
  # Compose validation: render both the default and HTB-profile
  # configurations. Rendering is pure interpolation/parsing — it never
  # starts a container, never creates /dev/net/tun, and never contacts
  # HTB. The HTB profile path below is a placeholder string used only to
  # satisfy Compose's `${APEX_HTB_OVPN_PATH:?...}` interpolation
  # requirement; Compose does not check the file's existence at `config`
  # time (only `up`/`run` would), so no dummy .ovpn file is created here.
  # ---------------------------------------------------------------------
  compose-validate:
    name: Validate Compose configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Render default Compose configuration
        env:
          APEX_TOOL_SERVICE_TOKEN: ci-disposable-token
        run: docker compose config > /tmp/compose-default.rendered.yml

      - name: Render HTB Compose override configuration (no real VPN profile)
        env:
          APEX_TOOL_SERVICE_TOKEN: ci-disposable-token
          # Interpolation placeholder ONLY — Compose's `config` subcommand
          # never checks that this path exists; no file is created, no
          # VPN starts, no /dev/net/tun is requested, no HTB target is
          # contacted. See docs/htb-vpn-container.md / docs/github-actions.md.
          APEX_HTB_OVPN_PATH: ./secrets/ci-placeholder.ovpn
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.htb.yaml \
            --profile htb \
            config > /tmp/compose-htb.rendered.yml

      - name: Confirm no VPN-relevant runtime state was created
        run: |
          test ! -e /dev/net/tun
          test ! -e ./secrets/ci-placeholder.ovpn
          echo "OK: no VPN device or profile file exists after config rendering"

  # ---------------------------------------------------------------------
  # Build all three project images WITHOUT pushing anywhere. No GHCR
  # login, no packages:write permission anywhere in this workflow. Only
  # runs after validate/compose-validate succeed, so a broken lint/test
  # run never wastes CI minutes on a Docker build that would be discarded
  # anyway.
  # ---------------------------------------------------------------------
  build-images:
    name: Build ${{ matrix.image }} image (validation only, no push)
    runs-on: ubuntu-latest
    needs:
      - validate
      - compose-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: apex
            dockerfile: docker/apex/Dockerfile
          - image: apex-kali
            dockerfile: docker/kali/Dockerfile
          - image: apex-vpn
            dockerfile: docker/vpn/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build ${{ matrix.image }} (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

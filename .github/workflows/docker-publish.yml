# docker-publish.yml
# Publishes the three project images (apex, apex-kali, apex-vpn) to GHCR (Infra Phase 11) — only on trusted events (default-branch pushes, version tags, manual dispatch), never on pull requests. Publishing always depends on a fresh, successful validation job — a broken build is never published, even if an unrelated earlier CI run passed.
#
# Never uses `pull_request`/`pull_request_target` as a trigger. Never
# grants `packages: write` to untrusted code. Never contacts HTB, never
# starts a real VPN, never reads a real .env/.ovpn file. See
# docs/github-actions.md for the full design and docs/htb-vpn-container.md
# for what this project's HTB VPN integration does and does not do in CI.

name: Publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege. `packages: write` is required to push to GHCR;
# `contents: read` is required to check out the repository. Nothing else
# is granted anywhere in this file. The `validate` job below narrows this
# further to `contents: read` only, since it never touches GHCR.
permissions:
  contents: read
  packages: write

# Keyed by ref (not by workflow run), and NEVER cancels an in-flight
# publish — an image push must run to completion, never be interrupted
# mid-manifest-upload by a newer, unrelated run. This is intentionally a
# separate concurrency group from ci.yml's (which DOES cancel in-progress
# runs) — a version-tag or main-branch publish must never be cancelled by
# an unrelated feature-branch's CI run, and the two workflows never share
# a group name.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------
  # Full, independent re-validation — this job does not assume ci.yml
  # already ran successfully for this exact commit (workflow_dispatch and
  # tag pushes in particular may not have an associated ci.yml run at
  # all). `build-and-push` below declares `needs: [validate]`, so
  # publishing is structurally impossible without this job passing first.
  # ---------------------------------------------------------------------
  validate:
    name: Validate (lock, sync, pytest, ruff, mypy, compose)
    runs-on: ubuntu-latest
    # Narrower than the workflow-level permissions above — this job never
    # touches GHCR, so it never needs packages:write even though the
    # workflow as a whole is granted it for the later publish job.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Verify uv.lock is up to date
        run: uv lock --check

      - name: Install frozen dependencies
        run: uv sync --frozen --all-groups

      - name: Run full test suite
        run: uv run pytest -q

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy (strict, project-scoped)
        run: uv run mypy

      - name: Render default Compose configuration
        env:
          APEX_TOOL_SERVICE_TOKEN: ci-disposable-token
        run: docker compose config > /tmp/compose-default.rendered.yml

      - name: Render HTB Compose override configuration (no real VPN profile)
        env:
          APEX_TOOL_SERVICE_TOKEN: ci-disposable-token
          APEX_HTB_OVPN_PATH: ./secrets/ci-placeholder.ovpn
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.htb.yaml \
            --profile htb \
            config > /tmp/compose-htb.rendered.yml

  # ---------------------------------------------------------------------
  # Build and push all three images to GHCR. Only reachable once
  # `validate` has succeeded (see `needs:` below) — this is the
  # structural, non-bypassable dependency the task brief requires ("do
  # not rely only on branch protection").
  # ---------------------------------------------------------------------
  build-and-push:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs:
      - validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: apex
            dockerfile: docker/apex/Dockerfile
            description: APEX orchestration/planning/policy/memory application (Infra Phase 5)
          - image: apex-kali
            dockerfile: docker/kali/Dockerfile
            description: Restricted, allowlisted Kali tool-execution appliance (Infra Phase 6)
          - image: apex-vpn
            dockerfile: docker/vpn/Dockerfile
            description: Dedicated HTB VPN tunnel container (Infra Phase 10)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute lowercase image owner
        id: owner
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}
          # latest only ever tracks the default branch — never a version
          # tag push, never a feature branch, never a PR.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # BuildKit provenance + SBOM attestations, pushed alongside the
          # image manifest as OCI referrers — supported by GHCR and by
          # docker/build-push-action's default docker-container Buildx
          # driver (installed by docker/setup-buildx-action above). Only
          # meaningful for a pushed image, so this is deliberately NOT
          # enabled in ci.yml's push:false validation build. Neither
          # attestation asserts full reproducibility of the Kali image's
          # `apt-get install` step — the base image digest and this
          # Dockerfile's own instructions are pinned/committed, but Kali
          # rolling has no dated package-snapshot repository, so the
          # exact package *versions* resolved at build time can still
          # differ between builds (documented, pre-existing limitation —
          # see docker/kali/Dockerfile's own "DOCUMENTED LIMITATION"
          # comment and docs/kali-container.md "Base image").
          provenance: true
          sbom: true
